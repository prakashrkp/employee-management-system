{% extends 'base.html' %}


{% block content %}

<h2>Login</h2>


<form method="POST">

{% csrf_token %}


<input type="text"
name="username"
placeholder="Username"
class="form-control mb-3">


<input type="password"
name="password"
placeholder="Password"
class="form-control mb-3">


<button class="btn btn-primary">
Login
</button>


</form>


{% endblock %}
