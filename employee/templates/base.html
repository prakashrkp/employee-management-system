<!DOCTYPE html>
<html>
<head>
    <title>Employee Management System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/dashboard/">
      Employee Management
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
            data-bs-target="#navbarNav" aria-controls="navbarNav"
            aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
      <div class="ms-auto d-flex flex-wrap gap-2 mt-2 mt-lg-0">
        <a class="btn btn-outline-light" href="/dashboard/">Dashboard</a>
        <a class="btn btn-outline-light" href="/employees/">Employees</a>
        <a class="btn btn-outline-light" href="/add-employee/">Add Employee</a>
        <a class="btn btn-danger" href="/logout/">Logout</a>
      </div>
    </div>
  </div>
</nav>

<!-- Main Content -->
<div class="container mt-5">
{% block content %}
{% endblock %}
</div>

<!-- Footer -->
<footer class="bg-dark text-white text-center mt-5 p-3">
  <p class="mb-0">Employee Management System © 2026</p>
</footer>

<!-- Bootstrap JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
